name: Deploy to Azure VMs (self-hosted)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    strategy:
      matrix:
        runner_label: [revision-vm, revision-vm2]
        # ^ replace with the EXACT names shown in GitHub's Runners page
    runs-on: ${{ matrix.runner_label }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm install

      - name: Build React app
        run: npm run build

      - name: Restart app with pm2
        run: |
          pm2 restart myapp || pm2 start server.js --name myapp
