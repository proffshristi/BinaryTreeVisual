name: Deploy to Azure VM (self-hosted)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted
    # ^ THIS is the key change - instead of "ubuntu-latest" (GitHub's servers),
    #   this tells GitHub "run this job on MY registered VM instead"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        # ^ this automatically clones/pulls your repo directly onto the VM -
        #   this REPLACES you manually running "git clone" yourself

      - name: Install dependencies
        run: npm install

      - name: Build React app
        run: npm run build

      - name: Restart app with pm2
        run: |
          pm2 restart BinaryTreeVisual || pm2 start server.js --name BinaryTreeVisual
          # ^ tries to restart if already running, otherwise starts fresh