name: Deploy to VM

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm install

      - name: Build the React app
        run: npm run build

      - name: Copy build output to web root
        run: sudo cp -r build/* /datadrive/www/

      - name: Reload nginx
        run: sudo systemctl reload nginx
