name: Deploy to VM

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy files to web root
        run: sudo cp -r * /datadrive/www/

      - name: Reload nginx
        run: sudo systemctl reload nginx
